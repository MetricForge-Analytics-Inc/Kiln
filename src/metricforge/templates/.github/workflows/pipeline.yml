name: Pipeline — Build & Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install flake8
      - run: flake8 Orchestration/ --max-line-length=120

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install pytest pyyaml prefect
      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-orchestration:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Orchestration/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/orchestration:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/orchestration:${{ github.sha }}

  build-visualization:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Visualization/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/visualization:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/visualization:${{ github.sha }}

  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    needs: [build-orchestration, build-visualization]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploy to staging — add your deployment commands here"
          # docker compose -f docker-compose.yml pull
          # docker compose -f docker-compose.yml up -d

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [build-orchestration, build-visualization]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploy to production — add your deployment commands here"
          # docker compose -f docker-compose.yml pull
          # docker compose -f docker-compose.yml up -d
