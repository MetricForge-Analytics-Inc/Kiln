_templates_suffix: .jinja
_envops:
  block_end_string: "%}"
  block_start_string: "{%"
  comment_end_string: "#}"
  comment_start_string: "{#"
  keep_trailing_newline: true
  variable_end_string: "}}"
  variable_start_string: "{{"

# Project metadata
project_name:
  type: str
  help: Project name (e.g., 'MyCity-Analytics', 'ClientName-DataPlatform')
  placeholder: MyCity-Analytics

project_slug:
  type: str
  default: "{{ project_name.lower().replace(' ', '_').replace('-', '_') }}"
  help: Project slug for directories and imports (auto-generated from project name)

description:
  type: str
  help: Brief description of your data platform
  default: A modular data platform powered by MetricForge

# Architecture choices
data_warehouse:
  type: str
  help: Choose your primary data warehouse
  default: duckdb_local
  choices:
    duckdb_local: "DuckDB (Local file-based)"
    motherduck: "MotherDuck (Managed DuckDB Cloud)"
    snowflake: "Snowflake (Enterprise cloud DW)"
    bigquery: "BigQuery (Google Cloud)"

semantic_layer:
  type: str
  help: Choose your semantic layer
  default: cube_oss
  choices:
    cube_oss: "Cube.js OSS (Open source, Docker-based)"
    cube_cloud: "Cube Cloud (Managed SaaS)"
    looker: "Looker (Google Cloud BI)"
    metabase: "Metabase (Open source BI)"
    superset: "Apache Superset (Open source BI)"

# Organization settings
organization_name:
  type: str
  help: Organization/owner name
  placeholder: MyOrganization

# Docker settings
include_docker:
  type: bool
  default: true
  help: Include Docker Compose setup for local development

# Testing & CI/CD
include_tests:
  type: bool
  default: true
  help: Include pytest configuration and example tests

include_cicd:
  type: bool
  default: true
  help: Include GitHub Actions CI/CD workflows

# AI/ML features
include_llm_agent:
  type: bool
  default: false
  help: Include LLM agent for data exploration (Langchain setup)

include_dbt:
  type: bool
  default: false
  help: Include dbt for transformation (alternative to SQLMesh)

# Development configuration
python_version:
  type: str
  default: "3.11"
  help: Python version for the project

# Post-generation hooks
_tasks:
  - python src/metricforge/cli/initialize.py --config "{{ _copier_conf }}"
